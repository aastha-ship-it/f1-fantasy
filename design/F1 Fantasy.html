<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>F1 Fantasy — The Group · 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         oklch(16% 0.012 27);
    --surface:    oklch(21% 0.015 27);
    --surface-2:  oklch(26% 0.018 27);
    --border:     oklch(34% 0.020 27);
    --fg:         oklch(96% 0.008 27);
    --fg-muted:   oklch(72% 0.015 27);
    --fg-subtle:  oklch(52% 0.018 27);
    --accent:     oklch(62% 0.22 27);
    --success:    oklch(68% 0.18 150);
    --warning:    oklch(74% 0.18 70);
    --error:      oklch(60% 0.22 15);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0a0608; color: var(--fg); font-family: 'Geist', system-ui, sans-serif; }
  body { font-variant-numeric: tabular-nums; }

  /*
   * Boldonse has dramatically tall ascenders + descenders that overflow its
   * line-box at any line-height < ~1.1. This collides with siblings above
   * (eyebrow labels, position numbers) and clips inside containers.
   * Global override: enforce a safe minimum line-height + add 0.15em
   * top padding to absorb ascender overflow.
   */
  [style*="Boldonse"] {
    line-height: 1.05 !important;
    padding-top: 0.12em;
    padding-bottom: 0.04em;
  }
  /* Allow explicit opt-out for full-bleed cinematic display type (reveal hero) */
  [style*="Boldonse"][data-tight] {
    line-height: 0.95 !important;
    padding-top: 0.08em;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="screens-auth.jsx"></script>
<script type="text/babel" src="screens-dashboard.jsx"></script>
<script type="text/babel" src="screens-predict.jsx"></script>
<script type="text/babel" src="screens-reveal.jsx"></script>
<script type="text/babel" src="screens-world.jsx"></script>
<script type="text/babel" src="screens-aux.jsx"></script>

<script type="text/babel">
  const { useState } = React;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "speed": 1,
    "reduced": false,
    "sweepTeam": "mclaren",
    "outcome": "normal",
    "showPhotos": true
  }/*EDITMODE-END*/;

  function App() {
    const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const [playKey, setPlayKey] = useState(0);

    return (
      <>
        <DesignCanvas title="F1 Fantasy — The Group · Season 2026"
                      subtitle="Hi-fi mockups · 2026 grid · Miami GP reveal · Click any artboard to focus">
          <DCSection id="reveal" title="The Reveal — Sunday Night Showdown">
            <DCArtboard id="reveal-main" label="Reveal · Miami GP — full cinematic sequence" width={SCREEN_W} height={1600}>
              <RevealScreen playKey={playKey} speed={tw.speed} reduced={tw.reduced}
                            sweepTeam={tw.sweepTeam} outcome={tw.outcome} highlightYou="aastha" />
              {/* Replay button overlay */}
              <button onClick={() => setPlayKey(k => k + 1)} style={{
                position: 'absolute', top: 24, right: 88, zIndex: 10,
                fontFamily: 'Geist Mono, monospace', fontSize: 11, letterSpacing: '0.1em',
                padding: '10px 16px', background: 'var(--accent)', color: 'var(--fg)',
                border: 'none', cursor: 'pointer', textTransform: 'uppercase',
              }}>↻ Replay reveal</button>
            </DCArtboard>
          </DCSection>

          <DCSection id="core" title="The Loop — Predict, Track, Compete">
            <DCArtboard id="dashboard" label="Dashboard · Calendar + standings" width={SCREEN_W} height={1400}>
              <DashboardScreen />
            </DCArtboard>
            <DCArtboard id="predict-list" label="Predict · Event list (next + past + upcoming)" width={SCREEN_W} height={1700}>
              <PredictListScreen />
            </DCArtboard>
            <DCArtboard id="predict" label="Predict · Miami GP picks (detail)" width={SCREEN_W} height={1500}>
              <PredictScreen />
            </DCArtboard>
            <DCArtboard id="world-standings" label="F1 World Championship · Driver + Constructor standings" width={SCREEN_W} height={2400}>
              <WorldStandingsScreen />
            </DCArtboard>
            <DCArtboard id="standings" label="The Group · League standings" width={SCREEN_W} height={1100}>
              <StandingsScreen />
            </DCArtboard>
          </DCSection>

          <DCSection id="onboarding" title="Onboarding — Sign In + Profile">
            <DCArtboard id="join" label="/join · Invite-code gate" width={SCREEN_W} height={900}>
              <JoinScreen />
            </DCArtboard>
            <DCArtboard id="login" label="Login · Sign in with Google" width={SCREEN_W} height={900}>
              <LoginScreen />
            </DCArtboard>
            <DCArtboard id="profile" label="Profile · Pick favourite team & driver" width={SCREEN_W} height={1000}>
              <ProfileScreen />
            </DCArtboard>
          </DCSection>

          <DCSection id="admin" title="Admin — Results Entry + Reveal Trigger">
            <DCArtboard id="admin" label="/admin · Event control + system status" width={SCREEN_W} height={1500}>
              <AdminScreen />
            </DCArtboard>
            <DCArtboard id="admin-results" label="/admin/results/[eventId] · Saudi Arabia · Manual entry" width={SCREEN_W} height={1500}>
              <AdminResultsScreen />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>

        <TweaksPanel title="Tweaks">
          <TweakSection title="Reveal Animation">
            <TweakSlider label="Speed" value={tw.speed} min={0.25} max={3} step={0.25} suffix="×"
                         onChange={(v) => setTweak('speed', v)} />
            <TweakToggle label="Reduced motion (instant flip)" value={tw.reduced}
                         onChange={(v) => setTweak('reduced', v)} />
            <TweakSelect label="Sweep car livery" value={tw.sweepTeam}
                         options={Object.keys(TEAMS).map(k => ({ value: k, label: TEAMS[k].name }))}
                         onChange={(v) => setTweak('sweepTeam', v)} />
            <TweakRadio label="Demo outcome" value={tw.outcome}
                        options={[
                          { value: 'normal',  label: 'Mixed' },
                          { value: 'perfect', label: 'All perfect' },
                          { value: 'miss',    label: 'All miss' },
                        ]}
                        onChange={(v) => setTweak('outcome', v)} />
            <TweakButton label="↻ Replay reveal" onClick={() => setPlayKey(k => k + 1)} />
          </TweakSection>
          <TweakSection title="Visual">
            <TweakToggle label="Driver photos / portraits" value={tw.showPhotos}
                         onChange={(v) => setTweak('showPhotos', v)} />
          </TweakSection>
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
